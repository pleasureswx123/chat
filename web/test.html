<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    /* 加载提示样式 */
    #loading-overlay {
      display: none;
    }

    #loading-overlay.hidden {
      display: none;
    }
  </style>
</head>
<body>



<!--审核智能体开始-->
<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.20/libs/cn/index.js"></script>
<script>
  function enablePasteImage() {
    // 全局粘贴事件监听
    document.addEventListener('paste', async (event) => {
      const items = event.clipboardData?.items;
      if (!items) return;

      // 查找剪贴板中的图片
      for (let i = 0; i < items.length; i++) {
        const item = items[i];

        if (item.type.indexOf('image') !== -1) {
          const file = item.getAsFile();
          if (!file) continue;

          console.log('📋 检测到粘贴图片:', file.name, file.type, (file.size / 1024).toFixed(2) + 'KB');

          // 查找 Coze SDK 的 textarea 输入框
          const textarea = document.querySelector('textarea[data-testid="bot.ide.chat_area.chat_input.textarea"]');

          if (!textarea) {
            console.warn('⚠️ 未找到 Coze 聊天输入框');
            continue;
          }

          // 阻止默认粘贴行为
          event.preventDefault();
          event.stopPropagation();

          // 查找隐藏的文件上传输入框
          const fileInput = document.querySelector('input[type="file"]');

          if (fileInput) {
            try {
              // 创建 DataTransfer 对象来模拟文件选择
              const dataTransfer = new DataTransfer();
              dataTransfer.items.add(file);
              fileInput.files = dataTransfer.files;

              // 触发多个事件以确保 SDK 能够识别
              fileInput.dispatchEvent(new Event('change', { bubbles: true }));
              fileInput.dispatchEvent(new Event('input', { bubbles: true }));

              console.log('✅ 图片已成功粘贴到聊天框');
            } catch (error) {
              console.error('❌ 粘贴图片失败:', error);
            }
          } else {
            console.warn('⚠️ 未找到文件上传输入框');
          }

          break;
        }
      }
    }, true); // 使用捕获阶段,确保优先处理

    console.log('✅ 粘贴图片功能已启用');

    // 监听 DOM 变化,确保 textarea 加载后提示用户
    const observer = new MutationObserver(() => {
      const textarea = document.querySelector('textarea[data-testid="bot.ide.chat_area.chat_input.textarea"]');
      if (textarea) {
        console.log('✅ Coze 聊天输入框已加载,可以使用 Ctrl+V 粘贴图片');
        observer.disconnect();
      }
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  }

  async function fetchToken() {
    const response = await fetch('https://sd6rq7nhgrokt7kpcrjfg.apigateway-cn-beijing.volceapi.com/callback', {
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    });

    if (!response.ok) {
      throw new Error(`获取 token 失败: ${response.status}`);
    }

    const data = await response.json();
    if (!data.access_token) {
      throw new Error('返回的数据中没有 access_token');
    }

    return data.access_token;
  }

  async function initChatSDK() {
    try {
      const initialToken = await fetchToken();

      const client = new CozeWebSDK.WebChatClient({
        config: {
          type: 'bot',
          bot_id: '7614433069122224128',
        },
        auth: {
          type: 'token',
          token: initialToken,
          onRefreshToken: fetchToken
        },
        // 使用固定的 user_id 保持会话一致性
        userInfo: {
          id: 'jwt_oauth_user',
          url: 'https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze/coze-logo.png',
          nickname: 'User'
        },
        ui: {
          base: {
            icon: 'https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze/chatsdk-logo.png',
            layout: 'pc',
            lang: 'zh-CN',
            zIndex: 3000
          },
          header: {
            isShow: true,
            isNeedClose: true,
          },
          asstBtn: {
            isNeed: true
          },
          footer: {
            isShow: false,
            expressionText: 'Powered by 凡高',
          },
          chatBot: {
            title: 'AI辅助决策审批助手',
            uploadable: true,
            width: 800,
          },
          conversations: {
            isNeed: false
          },
        },
      });

      // 等待 Coze SDK 完全渲染后再启用粘贴功能
      setTimeout(() => {
        enablePasteImage();
        console.log('🎉 Coze 聊天界面已就绪');
      }, 1000);

    } catch (error) {
      console.error("❌ 初始化失败:", error);
    }
  }

  initChatSDK();
</script>
<!--审核智能体结束-->




</body>
</html>
