<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    /* 加载提示样式 */
    #loading-overlay {
      display: none;
    }

    #loading-overlay.hidden {
      display: none;
    }
  </style>
</head>
<body>
<!-- 加载提示 -->
<div id="loading-overlay" style="display: none">
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在初始化聊天服务...</div>
    <div id="error-message" class="error-message" style="display: none;"></div>
  </div>
</div>

<!-- Install SDK -->
<script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.19/libs/cn/index.js"></script>
<script>
  const API_BASE_URL = 'http://127.0.0.1:8080';

  /**
   * 启用粘贴图片功能
   * 监听全局粘贴事件，当用户粘贴图片时自动触发上传
   */
  function enablePasteImage() {
    document.addEventListener('paste', async (event) => {
      const items = event.clipboardData?.items;
      if (!items) return;

      // 查找剪贴板中的图片
      for (let i = 0; i < items.length; i++) {
        const item = items[i];

        if (item.type.indexOf('image') !== -1) {
          event.preventDefault();

          const file = item.getAsFile();
          if (!file) continue;

          // 查找输入框并触发文件选择
          // Coze SDK 的输入框通常有特定的类名或属性
          const fileInput = document.querySelector('input[type="file"]');
          if (fileInput) {
            // 创建 DataTransfer 对象来模拟文件选择
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            fileInput.files = dataTransfer.files;

            // 触发 change 事件
            const changeEvent = new Event('change', { bubbles: true });
            fileInput.dispatchEvent(changeEvent);

            console.log('已粘贴图片:', file.name, file.type, file.size);
          } else {
            console.warn('未找到文件上传输入框，粘贴功能可能不可用');
          }

          break;
        }
      }
    });

    console.log('粘贴图片功能已启用');
  }

  async function fetchToken() {
    const response = await fetch(`${API_BASE_URL}/callback`, {
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    });

    if (!response.ok) {
      throw new Error(`获取 token 失败: ${response.status}`);
    }

    const data = await response.json();
    if (!data.access_token) {
      throw new Error('返回的数据中没有 access_token');
    }

    return data.access_token;
  }

  function waitForSDK() {
    return new Promise((resolve, reject) => {
      const maxWait = 10000;
      const startTime = Date.now();

      const checkSDK = () => {
        if (window.CozeWebSDK && window.CozeWebSDK.WebChatClient) {
          resolve();
        } else if (Date.now() - startTime > maxWait) {
          reject(new Error('SDK 加载超时'));
        } else {
          setTimeout(checkSDK, 100);
        }
      };

      checkSDK();
    });
  }

  async function initChatSDK() {
    const loadingOverlay = document.getElementById('loading-overlay');
    const errorMessage = document.getElementById('error-message');

    try {
      await waitForSDK();
      const initialToken = await fetchToken();

      const client = new CozeWebSDK.WebChatClient({
        config: {
          type: 'bot',
          bot_id: '7614433069122224128',
        },
        auth: {
          type: 'token',
          token: initialToken,
          onRefreshToken: fetchToken
        },
        // 使用固定的 user_id 保持会话一致性
        userInfo: {
          id: 'jwt_oauth_user',
          url: 'https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze/coze-logo.png',
          nickname: 'User'
        },
        ui: {
          base: {
            icon: 'https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze/chatsdk-logo.png',
            layout: 'pc',
            lang: 'zh-CN',
            zIndex: 3000
          },
          header: {
            isShow: true,
            isNeedClose: true,
          },
          asstBtn: {
            isNeed: true
          },
          footer: {
            isShow: false,
            expressionText: 'Powered by 凡高',
          },
          chatBot: {
            title: 'AI辅助决策审批助手',
            uploadable: true,
            width: 800,
          },
          conversations: {
            isNeed: false
          },
        },
      });

      // 启用粘贴图片功能
      enablePasteImage();

      // 延迟隐藏加载提示
      setTimeout(() => {
        loadingOverlay.classList.add('hidden');
      }, 1000);

    } catch (error) {
      errorMessage.textContent = `初始化失败: ${error.message}`;
      errorMessage.style.display = 'block';

      setTimeout(() => {
        if (confirm('初始化失败，是否重试？\n\n请确保后端服务已启动 (http://127.0.0.1:8080)')) {
          location.reload();
        }
      }, 1000);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initChatSDK);
  } else {
    initChatSDK();
  }
</script>
</body>
</html>
